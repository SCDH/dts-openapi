components:
  responses:
    EntryOK:
      description: OK
      content:
        application/ld+json:
          schema:
            $ref: 'entry.yaml#/components/schemas/Entry'
    CollectionOK:
      description: OK
      content:
        application/ld+json:
          schema:
            $ref: 'collection.yaml#/components/schemas/Collection'
    NavigationOK:
      description: OK
      content:
        application/ld+json:
          schema:
            $ref: 'navigation.yaml#/components/schemas/Navigation'
    DocumentOK:
      description: OK
      content:
        application/tei+xml:
          schema:
            type: string
            format: binary
        text/html:
          schema:
            type: string
            format: binary
        text/plain:
          schema:
            type: string
            format: binary
      headers:
        Link:
          description: Link SHOULD contain a URI that links back to the Collection endpoint for the requested Resource.
          schema:
            type: string
            format: uri
    BadRequest:
      description: Bad Request
      content:
        text/plain:
          schema:
            type: string
        application/ld+json:
          schema:
            type: string
        application/tei+xml:
          schema:
            type: string
            format: binary
        text/html:
          schema:
            type: string
            format: binary
    NotFound:
      description: Not Found
      content:
        text/plain:
          schema:
            type: string
        application/ld+json:
          schema:
            type: string
        application/tei+xml:
          schema:
            type: string
            format: binary
        text/html:
          schema:
            type: string
            format: binary
