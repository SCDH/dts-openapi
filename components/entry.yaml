components:
  schemas:
    Entry:
      type: object
      required:
        - "@id"
        - "@type"
        - dtsVersion
        - collection
        - navigation
        - document
      properties:
        "@id":
          type: string
          description: The identifier of the API, generally its URL.
        "@context":
          type: object
          description: The JSON-LD context.
        "@type":
          type: string
          description: Default Value. EntryPoint.
        dtsVersion:
          type: string
          description: The version of the DTS specification providing the response.
        collection:
          type: string
          format: uri-template
          description: Link to the Collection API endpoint.
          example: /collection/{?id,page,nav}/d.json
        navigation:
          type: string
          format: uri-template
          description: Link to the Navigation API endpoint.
          example: https://generic-dts.example.com/dts/navigation/{?resource,ref,start,end,down,tree,page}
        document:
          type: string
          format: uri-template
          description: Link to the Document API endpoint.
          example: https://generic-dts.example.com/dts/document/{?resource,ref,start,end,tree,mediaType}
