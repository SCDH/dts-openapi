components:
  schemas:
    Collection:
      type: object
      required:
        - "@id"
        - "@type"
        - dtsVersion
        - title
        - totalParents
        - totalChildren
        - collection
      properties:
        "@context":
          $ref: 'context.yaml#/components/schemas/LODContext'
          description: The JSON-LD context.
        "@id":
          type: string
          description: The identifier of the Collection or Resource.
        "@type":
          type: string
          description: The type. Collection or Resource.
          enum: [ Collection, Resource ]
        dtsVersion:
          type: string
          description: The version of the DTS specification providing the response.
        title:
          type: string
          description: A name for the Collection or Resource. Additional names may be placed in dublinCore using title, e.g. for internationalization.
        totalParents:
          type: integer
          description: Total number of parent Collections or Resources.
        totalChildren:
          type: integer
          description: Total number of child Collections or Resources.
        member:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/Collection'
              - $ref: 'id.yaml#/components/schemas/Id'
        dublinCore:
          $ref: 'dublinCore.yaml#/components/schemas/DublinCore'
          description: Contains metadata following the Dublin Core Terms scheme.
        extensions:
          $ref: 'any.yaml#/components/schemas/Any'
          description: Contains any supplementary metadata following other schemes.
        collection:
          type: string
          format: uri-template
          description: Link to the Collection API endpoint for the Resource.
          example: /collection/?id=01{$page,nav}/d.json
        navigation:
          type: string
          format: uri-template
          description: Link to the Navigation API endpoint for the Resource.
          example: /navigation/?id=01{$ref,start,end,down,tree,page}/d.json
        document:
          type: string
          format: uri-template
          description: Link to the Document API endpoint for the Resource.
          example: /navigation/?id=01{$ref,start,end,tree,mediaType}/d.json
        download:
          $ref: 'download.yaml#/components/schemas/Download'
          description: A link or a key-value list of media types and links to downloadable versions of the Resource
        citationTrees:
          type: array
          items:
            $ref: 'citationTree.yaml#/components/schemas/CitationTree'
          description: 
        view:
          $ref: 'pagination.yaml#/components/schemas/Pagination'
          description: A Pagination object for paginated responses.
