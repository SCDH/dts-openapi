openapi: 3.1.0
info:
  title: DTS
  description: Entry and Collection endpoints
  version: 1.0rc1


paths:
  /entry:
    get:
      operationId: entry
      summary: GET request on the entry endpoint of the DTS API
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas/entry.yaml'
        "5XX":
          description: Unexpected error

  /collection:
    get:
      operationId: collection
      summary: Get a collection
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: './schemas/collection.yaml'
