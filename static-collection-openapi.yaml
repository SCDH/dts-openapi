openapi: 3.1.0
info:
  title: DTS
  description: Entry and Collection endpoints
  version: 1.0rc1

# USE INTERNED SPEC FROM DIRECTORY standalone INSTEAD!

paths:
  /entry:
    get:
      operationId: entry
      summary: GET request on the entry endpoint of the DTS API
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: 'components/entry.yaml#/components/schemas/Entry'
        "5XX":
          description: Unexpected error

  /collection/{id}/{page}/{nav}.json:
    get:
      operationId: collection
      summary: The collection endpoint is used for navigating collections. A collection contains metadata for the collection itself and an array of members. Each member is either a Collection or a Resource.
      parameters:
        - $ref: 'components/collection-path-params.yaml#/components/parameters/Id'
        - $ref: 'components/collection-path-params.yaml#/components/parameters/Page'
        - $ref: 'components/collection-path-params.yaml#/components/parameters/Nav'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: 'components/collection.yaml#/components/schemas/Collection'

