openapi: 3.1.0
info:
  title: DTS
  description: Entry and Collection endpoints
  version: 1.0rc1


paths:
  /entry:
    get:
      operationId: entry
      summary: GET request on the entry endpoint of the DTS API
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entry'
        "5XX":
          description: Unexpected error

  /collection/{id}/{page}/{nav}.json:
    get:
      operationId: collection
      summary: The collection endpoint is used for navigating collections. A collection contains metadata for the collection itself and an array of members. Each member is either a Collection or a Resource.
      parameters:
        - $ref: 'params/collection.yaml#/PathId'
        - $ref: 'params/collection.yaml#/PathPage'
        - $ref: 'params/collection.yaml#/PathNav'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'

components:
  schemas:
    Entry:
      $ref: 'schemas/entry.yaml#/components/schemas/Entry'
    Collection:
      $ref: 'schemas/collection.yaml#/components/schemas/Collection'
    Id:
      $ref: 'schemas/id.yaml#/components/schemas/Id'
    LODContext:
      $ref: 'schemas/context.yaml#/components/schemas/LODContext'
    ContextUri:
      $ref: 'schemas/context.yaml#/components/schemas/ContextUri'
    ContextObject:
      $ref: 'schemas/context.yaml#/components/schemas/ContextObject'
    ContextArray:
      $ref: 'schemas/context.yaml#/components/schemas/ContextArray'
