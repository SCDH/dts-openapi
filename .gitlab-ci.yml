variables:
  NPM_PREFIX: "@scdhapis"
  ARTIFACT_DIR: out


.release_rules_tag:
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+.\d+.\d+$/ # describe how your version tags look like!
 
.prerelease_rules_tag:
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+.\d+.\d+-rc/ # describe how your pre-release tags look like!
 

stages:
  - test
  - generate
  - build
  - deploy

validate:
  image: harbor.uni-muenster.de/proxy-docker/openapitools/openapi-generator-cli
  stage: test
  script:
    - openapi-generator-cli validate -i *-openapi.yaml

generate:
  image: harbor.uni-muenster.de/proxy-docker/openapitools/openapi-generator-cli
  stage: generate
  before_script:
    - apt-get -y install sed
  script:
    - oagen/fix-paths.sed --in-place oagen/*.yaml
    - openapi-generator-cli batch oagen/*.yaml
    - ls -l $ARTIFACT_DIR
  artifacts:
    paths:
      - $ARTIFACT_DIR
    expire_in: 1 hour


generic-package:
  image: harbor.uni-muenster.de/proxy-docker/openapitools/openapi-generator-cli
  stage: deploy
  before_script:
    - apt-get -y install curl zip
  script:
    - zip ${CI_PROJECT_NAMESPACE_SLUG}-${CI_COMMIT_TAG}.zip *.yaml schemas/* params/*
    - curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}"  --upload-file ${CI_PROJECT_NAMESPACE_SLUG}-${CI_COMMIT_TAG}.zip  ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAMESPACE_SLUG}/${CI_COMMIT_TAG}/${CI_PROJECT_NAMESPACE_SLUG}-${CI_COMMIT_TAG}.zip
  rules:
    - if: $CI_COMMIT_TAG

    
build-typescript-axios:
  image: harbor.uni-muenster.de/proxy-docker/library/node:latest
  stage: build
  needs:
    - generate
  script:
    - cd $ARTIFACT_DIR/typescript-axios
    - npm i
    - npm run build
  artifacts:
    paths:
      - $ARTIFACT_DIR/typescript-axios
    expire_in: 1 hour

deploy-typescript-axious:
  image: harbor.uni-muenster.de/proxy-docker/library/node:latest
  stage: deploy
  needs:
    - build-typescript-axios
  script:
    - cd $ARTIFACT_DIR/typescript-axios
    - echo "${NPM_PREFIX}:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - cat .npmrc
    - npm --no-git-tag-version version $CI_COMMIT_TAG
    - npm publish
  rules:
    - !reference [ .release_rules_tag, rules ]

# the pre-release is tagged "next"
deploy-prerelease-typescript-axious:
  image: harbor.uni-muenster.de/proxy-docker/library/node:latest
  stage: deploy
  needs:
    - build-typescript-axios
  script:
    - cd $ARTIFACT_DIR/typescript-axios
    - echo "${NPM_PREFIX}:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - cat .npmrc
    - npm --no-git-tag-version version $CI_COMMIT_TAG
    - npm publish --tag next
  rules:
    - !reference [ .prerelease_rules_tag, rules ]


release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG                  # Run this job when a tag is created manually
  script:
    - echo "Running the release job."
  release:
    tag_name: $CI_COMMIT_TAG
    name: 'Release $CI_COMMIT_TAG'
    description: '$CI_COMMIT_MESSAGE'
    assets:
      links:
        - name: ${CI_PROJECT_NAMESPACE_SLUG}-${CI_COMMIT_TAG}.zip
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${CI_PROJECT_NAMESPACE_SLUG}/${CI_COMMIT_TAG}/${CI_PROJECT_NAMESPACE_SLUG}-${CI_COMMIT_TAG}.zip
