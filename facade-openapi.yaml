openapi: 3.1.0
info:
  title: DTS
  description: Navigation and Document endpoints
  version: 1.0rc1


paths:
  /navigation:
    get:
      operationId: navigation
      summary: GET request on the navigation endpoint of the DTS API
      parameters:
        - $ref: 'params/navigation/query.yaml#/Resource'
        - $ref: 'params/navigation/query.yaml#/Ref'
        - $ref: 'params/navigation/query.yaml#/Start'
        - $ref: 'params/navigation/query.yaml#/End'
        - $ref: 'params/navigation/query.yaml#/Down'
        - $ref: 'params/navigation/query.yaml#/Tree'
        - $ref: 'params/navigation/query.yaml#/Page'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Navigation'
        "5XX":
          description: Unexpected error

  /document:
    get:
      operationId: document
      summary: The collection endpoint is used for navigating collections. A collection contains metadata for the collection itself and an array of members. Each member is either a Collection or a Resource.
      parameters:
        - $ref: 'params/navigation/query.yaml#/Resource'
        - $ref: 'params/navigation/query.yaml#/Ref'
        - $ref: 'params/navigation/query.yaml#/Start'
        - $ref: 'params/navigation/query.yaml#/End'
        - $ref: 'params/navigation/query.yaml#/Tree'
        - $ref: 'params/document/query.yaml#/MediaType'
      responses:
        "200":
          description: OK
          content:
            '*/*'
        "5XX":
          description: Unexpected error

# Used components must be imported here!
components:
  schemas:
    Any:
      $ref: 'schemas/any.yaml#/components/schemas/Any'
    CitableUnit:
      $ref: 'schemas/citableUnit.yaml#/components/schemas/CitableUnit'
    CitationTree:
      $ref: 'schemas/citationTree.yaml#/components/schemas/CitationTree'
    CiteStructure:
      $ref: 'schemas/citationTree.yaml#/components/schemas/CiteStructure'
    LODContext:
      $ref: 'schemas/context.yaml#/components/schemas/LODContext'
    ContextUri:
      $ref: 'schemas/context.yaml#/components/schemas/ContextUri'
    ContextObject:
      $ref: 'schemas/context.yaml#/components/schemas/ContextObject'
    ContextArray:
      $ref: 'schemas/context.yaml#/components/schemas/ContextArray'
    Download:
      $ref: 'schemas/download.yaml#/components/schemas/Download'
    dublinCore:
      $ref: 'schemas/dublinCore.yaml#/components/schemas/DublinCore'
    Entry:
      $ref: 'schemas/entry.yaml#/components/schemas/Entry'
    Id:
      $ref: 'schemas/id.yaml#/components/schemas/Id'
    Navigation:
      $ref: 'schemas/navigation.yaml#/components/schemas/Navigation'
    Pagination:
      $ref: 'schemas/pagination.yaml#/components/schemas/Pagination'

      
