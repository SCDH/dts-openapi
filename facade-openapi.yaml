openapi: 3.1.0
info:
  title: DTS
  description: Navigation and Document endpoints
  version: 1.0rc1


paths:
  /navigation:
    get:
      operationId: navigation
      summary: GET request on the navigation endpoint of the DTS API
      parameters:
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/ResourceQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/RefQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/StartQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/EndQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/DownQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/TreeQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/PageQ'
      responses:
        "200":
          $ref: '#/components/responses/NavigationOK'
        "5XX":
          description: Unexpected error

  /document:
    get:
      operationId: document
      summary: The collection endpoint is used for navigating collections. A collection contains metadata for the collection itself and an array of members. Each member is either a Collection or a Resource.
      parameters:
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/ResourceQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/RefQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/StartQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/EndQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/TreeQ'
        - $ref: 'components/document-query-params.yaml#/components/parameters/MediaTypeQ'
      responses:
        "200":
          $ref: '#/components/responses/DocumentOK'
        "5XX":
          description: Unexpected error

# Used components must be imported here!
components:
  schemas:
    Any:
      $ref: 'components/any.yaml#/components/schemas/Any'
    CitableUnit:
      $ref: 'components/citableUnit.yaml#/components/schemas/CitableUnit'
    CitationTree:
      $ref: 'components/citationTree.yaml#/components/schemas/CitationTree'
    CiteStructure:
      $ref: 'components/citationTree.yaml#/components/schemas/CiteStructure'
    LODContext:
      $ref: 'components/context.yaml#/components/schemas/LODContext'
    ContextUri:
      $ref: 'components/context.yaml#/components/schemas/ContextUri'
    ContextObject:
      $ref: 'components/context.yaml#/components/schemas/ContextObject'
    ContextArray:
      $ref: 'components/context.yaml#/components/schemas/ContextArray'
    Download:
      $ref: 'components/download.yaml#/components/schemas/Download'
    dublinCore:
      $ref: 'components/dublinCore.yaml#/components/schemas/DublinCore'
    Entry:
      $ref: 'components/entry.yaml#/components/schemas/Entry'
    Id:
      $ref: 'components/id.yaml#/components/schemas/Id'
    Navigation:
      $ref: 'components/navigation.yaml#/components/schemas/Navigation'
    Pagination:
      $ref: 'components/pagination.yaml#/components/schemas/Pagination'
      
  responses:
    EntryOK:
      $ref: 'components/responses.yaml#/components/responses/EntryOK'
    CollectionOK:
      $ref: 'components/responses.yaml#/components/responses/CollectionOK'
    NavigationOK:
      $ref: 'components/responses.yaml#/components/responses/NavigationOK'
    DocumentOK:
      $ref: 'components/responses.yaml#/components/responses/DocumentOK'
