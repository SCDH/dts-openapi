openapi: 3.1.0
info:
  title: DTS Facade
  description: Navigation and Document endpoints on a stateless microservice
  version: 1.0rc1


paths:
  /navigation:
    get:
      operationId: navigation
      summary: GET request on the navigation endpoint of the DTS API. In addition to the DTS specs this requires the path parameter 'collection', which can easily be passed around with the URI templates.
      parameters:
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/ResourceQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/RefQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/StartQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/EndQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/DownQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/TreeQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/PageQ'
        - $ref: '#/components/parameters/ResourceContext'
        - $ref: '#/components/parameters/FollowUpContext'
      responses:
        "200":
          $ref: 'components/responses.yaml#/components/responses/NavigationOK'
        "400":
          $ref: 'components/responses.yaml#/components/responses/BadRequest'
        "404":
          $ref: 'components/responses.yaml#/components/responses/NotFound'
        "5XX":
          description: Unexpected error

  /document:
    get:
      operationId: document
      summary: The collection endpoint is used for navigating collections. A collection contains metadata for the collection itself and an array of members. Each member is either a Collection or a Resource.
      parameters:
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/ResourceQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/RefQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/StartQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/EndQ'
        - $ref: 'components/navigation-query-params.yaml#/components/parameters/TreeQ'
        - $ref: 'components/document-query-params.yaml#/components/parameters/MediaTypeQ'
        - $ref: '#/components/parameters/ResourceContext'
        - $ref: '#/components/parameters/FollowUpContext'
      responses:
        "200":
          $ref: 'components/responses.yaml#/components/responses/DocumentOK'
        "400":
          $ref: 'components/responses.yaml#/components/responses/BadRequest'
        "404":
          $ref: 'components/responses.yaml#/components/responses/NotFound'
        "5XX":
          description: Unexpected error

# Used components must be imported here!
components:
  parameters:
    ResourceContext:
      name: cr
      in: query
      description: The context of the resources. Used for fetching resources.
      required: false
      style: deepObject
      schema:
        type: object
    FollowUpContext:
      name: cf
      in: query
      description: The context of the DTS API. Used for providing missing information for follow up links.
      required: false
      style: deepObject
      schema:
        type: object
