components:
  schemas:
    Pagination:
      description: A Pagination object for paginated responses.
      type: object
      required:
        - '@id'
        - '@type'
        - first
        - previous
        - next
        - last
      properties:
        '@id':
          type: string
          description: The identifier of the current page of the collection. This should be the full URI for the current request including the pagination request parameter
        '@type':
          type: string
          description: the type of the object. Must be Pagination
        first:
          type: string
          description: The URI for the first page of the paginated result set
        previous:
          type: string
          description: The URI for the previous page of the paginated result set
        next:
          type: string
          description: The URI for the next page of the paginated result set
        last:
          type: string
          description: The URI for the last page of the paginated result set
